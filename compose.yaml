services:

  nginx:
    image: nginx:1.19-alpine
    container_name: abromics-kg-nginx
    ports:
      - ${NGINX_HTTP_PORT}:80
      - ${NGINX_HTTPS_PORT}:443
    environment:
      - API_BASEPATH=${API_BASEPATH}
    volumes:
      - ./src/nginx-config/${NGINX_CONF_FILE}:/etc/nginx/nginx.conf
      - ./src/nginx-config/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./src/web:/usr/share/nginx/html
    depends_on:
      - virtuoso
      - api
    networks:
      - services

  virtuoso:
    build: ./src/graph
    container_name: abromics-kg-virtuoso
    environment:
      SPARQL_UPDATE: "true" 
      DEFAULT_GRAPH: "http://data.abromics.fr/"
    volumes:
      - ./src/data/virtuoso:/data
      - ./src/graph/graph-instance:/data/toLoad ## Should automatically load the ttl files from the graph instance to the default graph ## seems to work well
      - ./src/graph:/usr/local/virtuoso-opensource/share/virtuoso/vad
      - /dev/null:/usr/local/virtuoso-opensource/share/virtuoso/vad/old-data # delete the old data folder in the container so it doesn't load the old data
    ports:
      - 8890:8890
    networks:
      - services
      - graph

  api:
    build: ./src/api
    container_name: abromics-kg-api
    environment:
      - IS_DEV=${IS_DEV}
      - HTTP=${HTTP}
      - API_HOST=${API_HOST}
      - API_BASEPATH=${API_BASEPATH}
      - API_PORT=${API_PORT}
      - API_ADMIN_USERNAME=${API_ADMIN_USERNAME}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - VIRTUOSO_HOST=${VIRTUOSO_HOST}
      - VIRTUOSO_PORT=${VIRTUOSO_PORT}
    volumes:
      - ./src/api/app.py:/api/app.py
    ports:
      - 5000:5000
    networks:
      - services
      - graph


networks:

  ## Services network (all the containers that can serve the clients)
  services:
    name: abromics-kg-services-network

  ## give access to the virtuoso data directly through the graph network
  graph:
    name: abromics-kg-graph-network


