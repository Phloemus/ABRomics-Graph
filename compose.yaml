services:

  nginx:
    image: nginx:1.19-alpine
    container_name: abromics-kg-nginx
    ports:
      - ${NGINX_HTTP_PORT}:80
      - ${NGINX_HTTPS_PORT}:443
    environment:
      - API_BASEPATH=${API_BASEPATH}
    volumes:
      - ./src/nginx-config/${NGINX_CONF_FILE}:/etc/nginx/nginx.conf
      - ./src/nginx-config/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./src/docs/src:/usr/share/nginx/html/docs
    depends_on:
      - graphdb
      - api
      - docs
    networks:
      - services

  graphdb:
    build: ./src/graph
    container_name: abromics-kg-graphdb
    volumes:
      - ./src/graph/graph-data:/root/graphdb-import ## data and ontologies used in the KG
      - ./src/graph/config.ttl:/opt/graphdb/home/data/repositories/abromics-kg/config.ttl ## config pour graphdb
    ports:
      - 7200:7200
    networks:
      - services
      - graph

  api:
    build: ./src/api
    container_name: abromics-kg-api
    environment:
      - IS_DEV=${IS_DEV}
      - HTTP=${HTTP}
      - API_HOST=${API_HOST}
      - API_BASEPATH=${API_BASEPATH}
      - API_PORT=${API_PORT}
      - API_ADMIN_USERNAME=${API_ADMIN_USERNAME}
      - API_ADMIN_PASSWORD=${API_ADMIN_PASSWORD}
      - GRAPH_SERVER_HOST=${GRAPH_SERVER_HOST}
      - GRAPH_SERVER_PORT=${GRAPH_SERVER_PORT}
    volumes:
      - ./src/api/src:/api/src
    ports:
      - 5000:5000
    networks:
      - services
      - graph

  web:
    build: ./src/web
    container_name: abromics-kg-web
    ports:
      - 3001:3000
    networks:
      - services

  docs:
    build: ./src/docs
    container_name: abromics-kg-docs-builder
    networks:
      - services

networks:

  ## Services network (all the containers that can serve the clients)
  services:
    name: abromics-kg-services-network

  ## give access to the graphdb data directly through the graph network
  graph:
    name: abromics-kg-graph-network


