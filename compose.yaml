version: "0.1"

services:

  nginx:
    image: nginx:1.19-alpine
    container_name: abromics-kg-nginx
    ports:
      - 8081:80
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - virtuoso

  virtuoso:
    image: tenforce/virtuoso:1.3.1-virtuoso7.2.2
    container_name: abromics-virtuoso
    environment:
      SPARQL_UPDATE: "true"
      DEFAULT_GRAPH: "http://sparql.abromics.fr/"
    volumes:
      - ./data/virtuoso:/data
      - ./graph:/usr/local/virtuoso-opensource/share/virtuoso/vad
    ports:
      - "8890:8890"
    #entrypoint:
    #["virtuoso.sh", "/usr/local/virtuoso-opensource/share/virtuoso/vad/set_up.sh"]

