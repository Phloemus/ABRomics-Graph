upstream virtuoso {
    ip_hash;
    server virtuoso:8890;
}

upstream streamlit {
    ip_hash;
    server streamlit:8501;
}

server {

    listen 80;

    location /demo {
        proxy_pass http://streamlit;
    }

    location /demo/static {
        proxy_pass http://streamlit/static;
    }

    location /demo/vendor {
        proxy_pass http://streamlit/vendor;
    }

    location /demo/_stcore/health {
        proxy_pass http://streamlit/_stcore/health;
    }

    location /demo/_stcore/stream {
        proxy_pass http://streamlit/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
       proxy_pass http://virtuoso;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    server_name localhost;
}
