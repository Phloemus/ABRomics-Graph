upstream virtuoso {
    ip_hash;
    server virtuoso:8890;
}

server {

    listen 80;

    location / {
        proxy_pass http://virtuoso;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    server_name localhost;
}