upstream virtuoso {
    ip_hash;
    server virtuoso:8890;
}

upstream fastapi {
    ip_hash;
    server fastapi:8080;
}

upstream streamlit {
    ip_hash;
    server streamlit:8501;
}

server {

    listen 80;
    server_name localhost;

    error_page 404 /errors/404/index.html;

    location /api {
        proxy_pass http://fastapi;
    }

    location /sparql {
       proxy_pass http://virtuoso;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }
    
    location /errors/404/index.html {
        root /usr/share/nginx/html;
        internal;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

}
