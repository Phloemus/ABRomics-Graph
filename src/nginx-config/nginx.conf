## Nginx configurations

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
     worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
 		      '$status $body_bytes_sent "$http_referer" '
		      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile on;
    keepalive_timeout  65;

    upstream graphdb {
        ip_hash;
        server graphdb:7200;
    }
    
    upstream graph-api {
        ip_hash;
        server api:5000;
    }

    upstream web {
        ip_hash;
        server web:3000;
    }

    server {
    
        listen 80;
        server_name localhost;
    
        location /sparql {

            ## For all method except POST return the webapp
            limit_except POST {
                proxy_pass http://web;
            }

            ## For /sparql with POST method redirects to graphdb for query response
            proxy_pass http://graphdb/repositories/abromics-kg;
        }
    
        location /graph-api {
             proxy_pass http://graph-api;
        }

        location /graphdb/ {
            proxy_pass http://graphdb/;
        }
        
        location / {
            proxy_pass http://web;
        }
    
    }

}
