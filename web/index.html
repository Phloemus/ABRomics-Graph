<!DOCTYPE html>
<html lang="en-US">
<html>
    <head>

        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Brieuc Quemeneur">
        <meta name="creator" content="Brieuc Quemeneur">
        <meta name="description" content="A module that allows to search terms in an ontology dynamically">
        <meta name="robots" content="index, follow">
        <meta property="og:locale" content="en_US">
        <meta property="og:type" content="website">

        <link rel="icon" type="image/x-icon" href="assets/images/logos/small-logo.svg">
        <link rel="shortcut icon" type="image/x-icon" href="assets/images/logos/small-logo.svg">
        <link rel="stylesheet" href="assets/styles/index.css">

        <title>Ontology Browser</title>
    </head>
    <body>
        <section class="search-section">
            <h1>Ontology browser</h1>
            <input id="searchbar" type="text"/>
            <ul id="suggestions"></ul>
        </section>
    </body>
    <script>

        var suggestions = new Map();

        function updateSuggestions() {
            var htmlAllSuggestions = ""
            for (var [id, term] of suggestions) {
                const htmlSuggestion = `<li>${term.name} - ${term.ontologyName}:${term.id}</li>`
                htmlAllSuggestions = htmlAllSuggestions + htmlSuggestion
            }
            document.getElementById("suggestions").innerHTML = htmlAllSuggestions
        }
    
        function fetchSuggestions() {
            const textInput = document.getElementById("searchbar").value
            suggestions.set(textInput, {"name": textInput, "ontologyName": "ARO", "id": "000001"});
            updateSuggestions()
            console.log(textInput)
        }
        
        document.getElementById("searchbar").addEventListener('input', fetchSuggestions);

    </script>
</html>
